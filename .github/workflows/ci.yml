name: CI

on: [push, pull_request]

jobs:
  sintaxis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sintaxis de todos los JS
        run: |
          set -e
          for f in js/*.js sw.js; do
            node --check "$f"
            echo "OK $f"
          done
      - name: El index referencia una sola versión de cache (js/css)
        run: |
          n=$(grep -oE '(js/[a-z0-9_-]+\.js|css/styles\.css)\?v=[0-9]+' index.html | grep -oE 'v=[0-9]+' | sort -u | wc -l)
          if [ "$n" -ne 1 ]; then
            echo "index.html mezcla versiones ?v= en js/css:"
            grep -oE '(js/[a-z0-9_-]+\.js|css/styles\.css)\?v=[0-9]+' index.html | sort -u
            exit 1
          fi
